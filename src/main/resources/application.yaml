server:
  port: 4000
  shutdown: "graceful"

# If you want to use a database then uncomment the `group:, readiness: and include: "db"`
# lines in the health probes and uncomment the datasource section
management:
  endpoint:
    health:
      show-details: "always"
       group:
        readiness:
        # Include database connectivity in readiness checks.
         include: "db"
  endpoints:
    web:
      base-path: /
      exposure:
        # Expose only the endpoints required for operational health and service information.
        include: health,info

springdoc:
  packagesToScan: uk.gov.hmcts.reform.dev.controllers
  writer-with-order-by-keys: true

spring:
  config:
    import: "optional:configtree:/mnt/secrets/test/"
  application:
    name: Dev Test
  datasource:
    # Database connection details are supplied through environment variables
    # for local, CI/CD and cloud environments.
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}${DB_OPTIONS:}
    username: ${DB_USER_NAME}
    password: ${DB_PASSWORD}
    properties:
      charSet: UTF-8
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 10000
      pool-name: DevTestHikariCP
      max-lifetime: 7200000
      connection-timeout: 30000
  jpa:
    properties:
      hibernate:
        jdbc:
          lob:
            # Avoid unnecessary PostgreSQL large-object creation warnings.
            non_contextual_creation: true
